name: Fetch itch.io Stats

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC every day
  workflow_dispatch:        # also triggerable manually from the Actions tab

permissions:
  contents: write           # needed to commit snapshots.json back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch itch.io snapshot
        env:
          ITCH_API_KEY: ${{ secrets.ITCH_API_KEY }}
        run: node scripts/fetch-snapshot.js

      - name: Commit updated snapshot data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/snapshots.json
          # Only commit if there's actually a change
          git diff --staged --quiet || git commit -m "chore: stats snapshot $(date -u +%Y-%m-%d)"
          git push
